version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: orisios
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - '3001:3001'
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/orisios?schema=public
      - JWT_SECRET=supersecretchangeit
      - NODE_ENV=production
      - PORT=3001
    depends_on:
      - postgres
    restart: always

  frontend:
    build:
      context: .
      dockerfile: frontend/web/Dockerfile.prod
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
